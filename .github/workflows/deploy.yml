name: Deploy BlueOS Extension Image

on:
  push:

permissions:
  contents: write

jobs:
  deploy-docker-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Deploy BlueOS Extension
        uses: BlueOS-community/Deploy-BlueOS-Extension@v1.2.0
        with:
          docker-username: ${{ secrets.DOCKER_USERNAME }}
          docker-password: ${{ secrets.DOCKER_PASSWORD }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # NOTE: the action prepends image-prefix (default "blueos-") to image-name,
          # so this MUST NOT itself start with "blueos-" or the published image becomes
          # "vshie/blueos-blueos-marine-magnetics-explorer".
          image-name: ${{ vars.IMAGE_NAME || 'marine-magnetics-explorer' }}
          author: ${{ vars.MY_NAME }}
          author-email: ${{ vars.MY_EMAIL }}
          maintainer: ${{ vars.ORG_NAME }}
          maintainer-email: ${{ vars.ORG_EMAIL }}
